<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Pixel RPG</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  overflow:hidden;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

canvas{
  background:#1a1a1a;
  image-rendering:pixelated;
  box-shadow:0 0 30px rgba(0,0,0,0.8);
}

#start-screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:30px;
  border-radius:12px;
  color:white;
  text-align:center;
  z-index:100;
  box-shadow:0 0 40px rgba(0,0,0,0.9);
}

.char-option{
  display:inline-block;
  margin:10px;
  padding:10px;
  border:3px solid transparent;
  border-radius:10px;
  cursor:pointer;
}

.char-option:hover,
.selected{
  border-color:#4ade80;
}

input{
  padding:12px;
  width:240px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
  font-size:18px;
}

button{
  margin-top:15px;
  padding:12px 28px;
  border:none;
  border-radius:6px;
  background:#4ade80;
  color:black;
  font-size:18px;
  cursor:pointer;
  font-weight:bold;
}

#chat{
  position:absolute;
  left:10px;
  bottom:10px;
  width:320px;
  background:rgba(0,0,0,0.85);
  border-radius:10px;
  padding:10px;
  display:none;
}

#messages{
  height:180px;
  overflow-y:auto;
  color:white;
  margin-bottom:10px;
  font-size:14px;
}

#chatInput{
  width:100%;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="start-screen">
  <h2>Choose Character</h2>

  <div class="char-option selected" data-char="original">
    <img src="frontwalk_1.png" width="64"><br>
    Black Suit
  </div>

  <div class="char-option" data-char="blue">
    <img src="bluefront1.png" width="64"><br>
    Blue Vest
  </div>

  <br>

  <input type="text" id="nameInput" maxlength="15" value="Player">

  <br>

  <button onclick="startGame()">Start Game</button>
</div>

<div id="chat">
  <div id="messages"></div>
  <input type="text" id="chatInput" placeholder="Type message...">
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

// IMPORTANT FIX
const socket = io();

const keys = {};

const SPRITE_WIDTH = 64;
const SPRITE_HEIGHT = 160;
const MOVE_SPEED = 2;
const FRAME_DELAY = 10;
const GROUND_OFFSET = 64;

let animationTimer = 0;

function loadSprites(prefix, underscore = true){
  return Array.from({length:4}, (_,i)=>{
    const img = new Image();
    img.src = underscore
      ? `${prefix}_${i+1}.png`
      : `${prefix}${i+1}.png`;
    return img;
  });
}

const characters = {
  original:{
    front:loadSprites("frontwalk", true),
    back:loadSprites("backwalk", true),
    side:loadSprites("rightwalk", true)
  },

  blue:{
    front:loadSprites("bluefront", false),
    back:loadSprites("blueback", false),
    side:loadSprites("blueright", false)
  }
};

const processedImages = new Map();

function makeBlackTransparent(img){

  if(processedImages.has(img.src)){
    return processedImages.get(img.src);
  }

  const off = document.createElement("canvas");
  off.width = img.width || SPRITE_WIDTH;
  off.height = img.height || SPRITE_HEIGHT;

  const offCtx = off.getContext("2d");

  offCtx.drawImage(img,0,0);

  const imageData = offCtx.getImageData(0,0,off.width,off.height);

  const data = imageData.data;

  for(let i=0;i<data.length;i+=4){

    if(
      data[i] < 12 &&
      data[i+1] < 12 &&
      data[i+2] < 12
    ){
      data[i+3] = 0;
    }
  }

  offCtx.putImageData(imageData,0,0);

  processedImages.set(img.src,off);

  return off;
}

let myPlayer = {
  x:350,
  y:250,
  frame:0,
  facingLeft:false,
  currentDir:"front",
  name:"Player",
  character:"original"
};

const otherPlayers = {};

function startGame(){

  const name =
    document.getElementById("nameInput")
    .value
    .trim();

  myPlayer.name = name || "Player";

  const selected =
    document.querySelector(".char-option.selected");

  myPlayer.character =
    selected.dataset.char;

  document.getElementById("start-screen")
    .style.display = "none";

  document.getElementById("chat")
    .style.display = "block";

  socket.emit("setPlayerData",{
    name:myPlayer.name,
    character:myPlayer.character
  });
}

document.querySelectorAll(".char-option")
.forEach(el=>{

  el.addEventListener("click",()=>{

    document.querySelectorAll(".char-option")
    .forEach(e=>e.classList.remove("selected"));

    el.classList.add("selected");
  });

});

socket.on("currentPlayers",(players)=>{

  Object.keys(players).forEach(id=>{

    if(id !== socket.id){
      otherPlayers[id] = players[id];
    }

  });

});

socket.on("playerJoined",(player)=>{
  otherPlayers[player.id] = player;
});

socket.on("playerMoved",(player)=>{
  otherPlayers[player.id] = player;
});

socket.on("playerUpdated",(player)=>{
  otherPlayers[player.id] = player;
});

socket.on("playerDisconnected",(id)=>{
  delete otherPlayers[id];
});

socket.on("chatHistory",(history)=>{
  history.forEach(addMessage);
});

socket.on("chatMessage",(msg)=>{
  addMessage(msg);
});

function addMessage(msg){

  const div = document.createElement("div");

  div.textContent =
    `${msg.name}: ${msg.text}`;

  div.style.marginBottom = "4px";

  if(msg.id === socket.id){
    div.style.color = "#4ade80";
  }

  document.getElementById("messages")
    .appendChild(div);

  div.scrollIntoView();
}

document.getElementById("chatInput")
.addEventListener("keypress",(e)=>{

  if(e.key === "Enter"){

    const text = e.target.value.trim();

    if(text){

      socket.emit("chatMessage",text);

      e.target.value = "";
    }
  }
});

function update(){

  let dx = 0;
  let dy = 0;

  if(keys["w"]) dy -= 1;
  if(keys["s"]) dy += 1;
  if(keys["a"]) dx -= 1;
  if(keys["d"]) dx += 1;

  const moving = dx !== 0 || dy !== 0;

  if(moving){

    const len = Math.hypot(dx,dy);

    dx = (dx/len) * MOVE_SPEED;
    dy = (dy/len) * MOVE_SPEED;

    myPlayer.x += dx;
    myPlayer.y += dy;

    if(dy < 0){
      myPlayer.currentDir = "back";
    }
    else if(dy > 0){
      myPlayer.currentDir = "front";
    }
    else{
      myPlayer.currentDir = "side";
    }

    myPlayer.facingLeft = dx < 0;

    animationTimer++;

    if(animationTimer >= FRAME_DELAY){

      myPlayer.frame =
        (myPlayer.frame + 1) % 4;

      animationTimer = 0;
    }

  }else{

    myPlayer.frame = 0;
    animationTimer = 0;
  }

  socket.emit("playerMovement",myPlayer);
}

function getFrames(player){

  const char =
    characters[player.character]
    || characters.original;

  if(player.currentDir === "back"){
    return char.back;
  }

  if(player.currentDir === "side"){
    return char.side;
  }

  return char.front;
}

function drawPlayer(player){

  const frames = getFrames(player);

  let img = frames[player.frame];

  if(!img || !img.complete) return;

  if(player.character === "blue"){
    img = makeBlackTransparent(img);
  }

  const drawX = Math.round(player.x);
  const drawY = Math.round(player.y - GROUND_OFFSET);

  if(player.facingLeft){

    ctx.save();

    ctx.scale(-1,1);

    ctx.drawImage(
      img,
      -drawX - SPRITE_WIDTH,
      drawY,
      SPRITE_WIDTH,
      SPRITE_HEIGHT
    );

    ctx.restore();

  }else{

    ctx.drawImage(
      img,
      drawX,
      drawY,
      SPRITE_WIDTH,
      SPRITE_HEIGHT
    );
  }

  ctx.fillStyle = "white";
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";

  ctx.fillText(
    player.name,
    drawX + SPRITE_WIDTH/2,
    drawY - 10
  );
}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  Object.values(otherPlayers)
    .forEach(drawPlayer);

  drawPlayer(myPlayer);
}

function gameLoop(){

  update();
  draw();

  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown",(e)=>{
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
  keys[e.key.toLowerCase()] = false;
});

gameLoop();
</script>

</body>
</html>
