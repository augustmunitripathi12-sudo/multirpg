<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Pixel RPG</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
  font-family:Arial;
}

/* CANVAS */
canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  image-rendering:pixelated;
  background:#1a1a1a;
  touch-action:none;
  z-index:1;
}

/* START SCREEN */
#start-screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:30px;
  border-radius:12px;
  color:white;
  z-index:10;
  text-align:center;
}

.char-option{
  display:inline-block;
  margin:10px;
  padding:8px;
  border:3px solid transparent;
  border-radius:10px;
  cursor:pointer;
}

.selected{ border-color:#4ade80; }

input{
  padding:10px;
  width:220px;
  margin-top:10px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
}

button{
  margin-top:10px;
  padding:12px 20px;
  background:#4ade80;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

/* CHAT */
#chat{
  position:absolute;
  left:10px;
  bottom:10px;
  width:300px;
  background:rgba(0,0,0,0.85);
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:10;
}

#messages{
  height:160px;
  overflow-y:auto;
  color:white;
  font-size:14px;
}

/* MOBILE CONTROLS */
#mobile-controls{
  position:absolute;
  bottom:20px;
  right:20px;
  display:none;
  z-index:10;
}

.ctrl{
  width:70px;
  height:70px;
  margin:5px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:26px;
}

.ctrl:active{
  background:#4ade80;
}

@media(max-width:900px){
  #mobile-controls{ display:block; }
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="start-screen">
  <h2>Start Game</h2>

  <div class="char-option selected" data-char="original">Black Suit</div>
  <div class="char-option" data-char="blue">Blue Vest</div>

  <br>

  <input id="nameInput" value="Player" maxlength="15">

  <br>

  <button id="startBtn">Start Game</button>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="chatInput" placeholder="Type...">
</div>

<div id="mobile-controls">
  <button class="ctrl" id="up">⬆</button><br>
  <button class="ctrl" id="left">⬅</button>
  <button class="ctrl" id="down">⬇</button>
  <button class="ctrl" id="right">➡</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const socket = io();

const keys = {};
let started = false;

/* START FIX */
document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("startBtn").addEventListener("touchstart",(e)=>{
  e.preventDefault();
  startGame();
});

function startGame(){
  started = true;

  myPlayer.name =
    document.getElementById("nameInput").value || "Player";

  myPlayer.character =
    document.querySelector(".selected").dataset.char;

  document.getElementById("start-screen").style.display="none";
  document.getElementById("chat").style.display="block";

  socket.emit("setPlayerData",{
    name:myPlayer.name,
    character:myPlayer.character
  });
}

/* CHARACTER SELECT */
document.querySelectorAll(".char-option").forEach(el=>{
  el.onclick=()=>{
    document.querySelectorAll(".char-option")
      .forEach(e=>e.classList.remove("selected"));
    el.classList.add("selected");
  };
});

/* PLAYER */
let myPlayer = {
  x:400,y:300,
  frame:0,
  facingLeft:false,
  currentDir:"front",
  name:"Player",
  character:"original"
};

const others = {};

/* SOCKET FIX (NO CLONES) */
socket.on("currentPlayers",(players)=>{
  Object.keys(players).forEach(id=>{
    if(id!==socket.id){
      others[id]=players[id];
    }
  });
});

socket.on("playerMoved",(p)=>{
  if(p.id!==socket.id){
    others[p.id]=p;
  }
});

socket.on("playerJoined",(p)=>{
  if(p.id!==socket.id){
    others[p.id]=p;
  }
});

socket.on("playerDisconnected",(id)=>{
  delete others[id];
});

/* CHAT */
socket.on("chatMessage",(m)=>{
  const d=document.createElement("div");
  d.textContent=`${m.name}: ${m.text}`;
  document.getElementById("messages").appendChild(d);
});

/* MOBILE CONTROLS FIX */
function bind(btn,key){
  const el=document.getElementById(btn);

  el.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    keys[key]=true;
  });

  el.addEventListener("touchend",(e)=>{
    e.preventDefault();
    keys[key]=false;
  });
}

bind("up","w");
bind("down","s");
bind("left","a");
bind("right","d");

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{
  keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",(e)=>{
  keys[e.key.toLowerCase()]=false;
});

/* FIXED SMOOTH MOVEMENT */
function update(){
  if(!started) return;

  let dx=0,dy=0;

  if(keys["a"]) dx--;
  if(keys["d"]) dx++;
  if(keys["w"]) dy--;
  if(keys["s"]) dy++;

  if(dx||dy){
    const len=Math.hypot(dx,dy);
    dx/=len;dy/=len;

    myPlayer.x+=dx*2;
    myPlayer.y+=dy*2;
  }

  socket.volatile.emit("playerMovement",myPlayer);
}

/* FIX CANVAS DRIFT */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* LOOP */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
