<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multiplayer Pixel RPG</title>
  <style>
    body { margin:0; background:#111; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family: Arial, sans-serif; }
    canvas { background:#1a1a1a; image-rendering:pixelated; box-shadow:0 0 30px rgba(0,0,0,0.8); }
    
    #start-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 30px;
      border-radius: 12px;
      color: white;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
      z-index: 100;
    }
    .char-option {
      display: inline-block;
      margin: 12px;
      cursor: pointer;
      padding: 8px;
      border: 3px solid transparent;
      border-radius: 10px;
    }
    .char-option:hover, .selected { border-color: #4ade80; }
    input { padding: 12px; width: 240px; font-size: 18px; background:#333; border: 2px solid #666; color:white; border-radius:6px; margin:10px 0; }
    button { padding: 12px 30px; font-size: 18px; background:#4ade80; border:none; border-radius:6px; cursor:pointer; margin-top:10px; }
  </style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<!-- Start Screen -->
<div id="start-screen">
  <h2>Choose Character & Name</h2>
  
  <div id="char-select">
    <div class="char-option selected" data-char="original">
      <img src="frontwalk_1.png" width="64" height="160"><br>
      <strong>Black Suit</strong>
    </div>
    <div class="char-option" data-char="blue">
      <img src="bluefront1.png" width="64" height="160"><br>
      <strong>Blue Vest</strong>
    </div>
  </div>

  <input type="text" id="nameInput" placeholder="Your Name" maxlength="15" value="Player">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="chat" style="position:absolute; bottom:10px; left:10px; width:380px; background:rgba(0,0,0,0.85); border-radius:8px; padding:10px; color:white; font-size:14px; display:none;">
  <div id="messages" style="height:180px; overflow-y:auto; margin-bottom:8px;"></div>
  <input type="text" id="chatInput" placeholder="Type message... (Enter)" maxlength="200">
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
// =============== SETUP ===============
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const socket = io("http://localhost:3000");

let keys = {};

// =============== SPRITE LOADER ===============
function loadSprites(prefix, hasUnderscore = true) {
  return Array.from({length:4}, (_,i) => {
    const img = new Image();
    img.src = hasUnderscore ? `${prefix}_${i+1}.png` : `${prefix}${i+1}.png`;
    return img;
  });
}

const characters = {
  original: {
    front: loadSprites("frontwalk", true),
    back:  loadSprites("backwalk", true),
    side:  loadSprites("rightwalk", true)
  },
  blue: {
    front: loadSprites("bluefront", false),
    back:  loadSprites("blueback", false),
    side:  loadSprites("blueright", false)
  }
};

let myPlayer = {
  x: 350, y: 250,
  frame: 0,
  facingLeft: false,
  currentDir: 'front',
  name: "Player",
  character: "original"
};

const otherPlayers = {};

// FIXED SIZE - Blue Vest is now the reference
const SPRITE_WIDTH = 64;
const SPRITE_HEIGHT = 160;
const MOVE_SPEED = 1.8;
const FRAME_DELAY = 10;
const GROUND_OFFSET = 64;
let animationTimer = 0;

// Transparency Fix Cache
const processedImages = new Map();

function makeBlackTransparent(img) {
  if (processedImages.has(img.src)) return processedImages.get(img.src);

  const offscreen = document.createElement("canvas");
  offscreen.width = img.width || SPRITE_WIDTH;
  offscreen.height = img.height || SPRITE_HEIGHT;
  const offCtx = offscreen.getContext("2d");
  
  offCtx.drawImage(img, 0, 0);
  const imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    if (data[i] < 12 && data[i+1] < 12 && data[i+2] < 12) {
      data[i + 3] = 0;
    }
  }
  offCtx.putImageData(imageData, 0, 0);
  processedImages.set(img.src, offscreen);
  return offscreen;
}

// =============== START GAME ===============
function startGame() {
  const name = document.getElementById("nameInput").value.trim() || "Player";
  myPlayer.name = name.substring(0, 15);
  
  const selected = document.querySelector('.char-option.selected');
  myPlayer.character = selected ? selected.dataset.char : "original";

  document.getElementById("start-screen").style.display = "none";
  document.getElementById("chat").style.display = "block";

  socket.emit('setPlayerData', { name: myPlayer.name, character: myPlayer.character });
}

// Character Selection
document.querySelectorAll('.char-option').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.char-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
  });
});

// =============== GAME CODE ===============
socket.on('currentPlayers', (players) => {
  Object.keys(players).forEach(id => {
    if (id !== socket.id) otherPlayers[id] = players[id];
  });
});

socket.on('playerJoined', (p) => { if (p.id !== socket.id) otherPlayers[p.id] = p; });
socket.on('playerMoved', (p) => { if (p.id !== socket.id) otherPlayers[p.id] = p; });
socket.on('playerUpdated', (p) => { if (p.id !== socket.id) otherPlayers[p.id] = p; });
socket.on('playerDisconnected', (id) => { delete otherPlayers[id]; });

socket.on('chatHistory', (history) => history.forEach(m => addMessage(m)));
socket.on('chatMessage', (m) => addMessage(m));

function addMessage(msg) {
  const div = document.createElement("div");
  div.style.margin = "3px 0";
  div.textContent = `${msg.name}: ${msg.text}`;
  if (msg.id === socket.id) div.style.color = "#4ade80";
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView();
}

document.getElementById("chatInput").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    const text = e.target.value.trim();
    if (text) {
      socket.emit('chatMessage', text);
      e.target.value = "";
    }
  }
});

function update() {
  let dx = 0, dy = 0;
  if (keys["w"]) dy -= 1;
  if (keys["s"]) dy += 1;
  if (keys["a"]) dx -= 1;
  if (keys["d"]) dx += 1;

  const moving = dx !== 0 || dy !== 0;

  if (moving) {
    const len = Math.hypot(dx, dy);
    dx = (dx / len) * MOVE_SPEED;
    dy = (dy / len) * MOVE_SPEED;

    myPlayer.x += dx;
    myPlayer.y += dy;

    if (dy < 0) myPlayer.currentDir = 'back';
    else if (dy > 0) myPlayer.currentDir = 'front';
    else myPlayer.currentDir = 'side';

    myPlayer.facingLeft = dx < 0;
  }

  if (moving) {
    animationTimer++;
    if (animationTimer >= FRAME_DELAY) {
      myPlayer.frame = (myPlayer.frame + 1) % 4;
      animationTimer = 0;
    }
  } else {
    myPlayer.frame = 0;
    animationTimer = 0;
  }

  socket.emit('playerMovement', {
    x: myPlayer.x,
    y: myPlayer.y,
    frame: myPlayer.frame,
    facingLeft: myPlayer.facingLeft,
    currentDir: myPlayer.currentDir,
    character: myPlayer.character
  });
}

function getFrames(player) {
  const char = characters[player.character] || characters.original;
  if (player.currentDir === 'back') return char.back;
  if (player.currentDir === 'side') return char.side;
  return char.front;
}

function drawPlayer(p) {
  let frames = getFrames(p);
  let img = frames[p.frame];
  if (!img || !img.complete) return;

  if (p.character === "blue") {
    img = makeBlackTransparent(img);
  }

  const drawX = Math.round(p.x);
  const drawY = Math.round(p.y - GROUND_OFFSET);

  if (p.facingLeft) {
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(img, -drawX - SPRITE_WIDTH, drawY, SPRITE_WIDTH, SPRITE_HEIGHT);
    ctx.restore();
  } else {
    ctx.drawImage(img, drawX, drawY, SPRITE_WIDTH, SPRITE_HEIGHT);
  }

  // Name
  ctx.fillStyle = "white";
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  ctx.fillText(p.name || "Player", drawX + SPRITE_WIDTH/2, drawY - 15);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  Object.values(otherPlayers).forEach(p => drawPlayer(p));
  drawPlayer(myPlayer);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

loop();
</script>
</body>
</html>
